<div class="accordion-item"><h2 class="accordion-header"><button class="accordion-button collapsed text-primary" type="button" data-bs-toggle="collapse" data-bs-target="#coll14">1. SSD SATA (2.5 polegadas)</button></h2><div id="coll14" class="accordion-collapse collapse" data-bs-parent="#acordeonDinamico"><div class="accordion-body bg-white" ><p>1. SSD SATA (2.5 polegadas)</p><div class="ratio ratio-16x9 my-3"><iframe src="https:
<div class="accordion-item"><h2 class="accordion-header"><button class="accordion-button collapsed text-primary" type="button" data-bs-toggle="collapse" data-bs-target="#coll20">2. SSD M.2 (NVMe ou SATA)</button></h2><div id="coll20" class="accordion-collapse collapse" data-bs-parent="#acordeonDinamico"><div class="accordion-body bg-white" ><p>2. SSD M.2 (NVMe ou SATA)</p><p>Estes são os modelos que parecem "pentes de memória" e são conectados diretamente na placa-mãe.</p><p>Não usam cabos: Eles são encaixados em um slot específico e parafusados. A energia e os dados passam diretamente pelos pinos do slot.</p></div></div></div>
<div class="accordion-item"><h2 class="accordion-header"><button class="accordion-button collapsed text-primary" type="button" data-bs-toggle="collapse" data-bs-target="#coll24">3. Diferenças de Padrão (SATA I, II e III)</button></h2><div id="coll24" class="accordion-collapse collapse" data-bs-parent="#acordeonDinamico"><div class="accordion-body bg-white" ><p>3. Diferenças de Padrão (SATA I, II e III)</p><p>Embora os cabos físicos sejam idênticos, as velocidades mudam. Um cabo SATA III é capaz de transferir até 6Gb/s. Se você usar um cabo muito antigo de um HD de 15 anos atrás, ele fisicamente encaixará no seu SSD, mas poderá limitar a velocidade máxima de transferência.</p><p>Resumo para sua instalação:</p></div></div></div>
<div class="accordion-item"><h2 class="accordion-header"><button class="accordion-button collapsed text-primary" type="button" data-bs-toggle="collapse" data-bs-target="#coll27"></button></h2><div id="coll27" class="accordion-collapse collapse" data-bs-parent="#acordeonDinamico"><div class="accordion-body bg-white" ><p></p><p>Se o seu SSD for do tipo "caixinha" (2.5"), pode usar os mesmos cabos do HD. Se for um SSD M.2 (fininho), ele dispensa qualquer tipo de cabo.</p><p>Você já verificou se a sua placa-mãe possui slots M.2 disponíveis ou se precisará usar as entradas SATA tradicionais? (Isso define qual formato de SSD você deve comprar).</p><p>Não exatamente</p><p>Embora os cabos e conectores físicos sejam os mesmos para o padrão SATA de 2.5 polegadas, a forma como HDs e SSDs utilizam a energia (as voltagens) varia conforme o tamanho e o tipo do dispositivo.</p><p>Aqui estão as diferenças principais:</p></div></div></div>
<div class="accordion-item"><h2 class="accordion-header"><button class="accordion-button collapsed text-primary" type="button" data-bs-toggle="collapse" data-bs-target="#coll34">1. HDs de Desktop (3.5 polegadas)</button></h2><div id="coll34" class="accordion-collapse collapse" data-bs-parent="#acordeonDinamico"><div class="accordion-body bg-white" ><p>1. HDs de Desktop (3.5 polegadas)</p><p>Utilizam 5V e 12V: Eles precisam da linha de 12V para alimentar o motor que gira os discos magnéticos e da linha de 5V para a placa lógica.</p><p>Atenção: Por isso, adaptadores USB simples (sem fonte externa) geralmente não conseguem ligar um HD de desktop, pois a porta USB fornece apenas 5V.</p></div></div></div>
<div class="accordion-item"><h2 class="accordion-header"><button class="accordion-button collapsed text-primary" type="button" data-bs-toggle="collapse" data-bs-target="#coll37">2. SSDs e HDs de Notebook (2.5 polegadas)</button></h2><div id="coll37" class="accordion-collapse collapse" data-bs-parent="#acordeonDinamico"><div class="accordion-body bg-white" ><p>2. SSDs e HDs de Notebook (2.5 polegadas)</p><p>Utilizam apenas 5V: Como não possuem motores grandes (ou motor nenhum, no caso do SSD), eles operam totalmente com 5V.</p><p>Compatibilidade: Mesmo que o cabo de energia da sua fonte envie 12V, o SSD simplesmente ignora essa linha e usa apenas os pinos de 5V. É totalmente seguro conectá-los.</p></div></div></div>
<div class="accordion-item"><h2 class="accordion-header"><button class="accordion-button collapsed text-primary" type="button" data-bs-toggle="collapse" data-bs-target="#coll40">3. SSDs M.2 (NVMe ou SATA)</button></h2><div id="coll40" class="accordion-collapse collapse" data-bs-parent="#acordeonDinamico"><div class="accordion-body bg-white" ><p>3. SSDs M.2 (NVMe ou SATA)</p><p>Utilizam 3.3V: Esse formato moderno não usa cabos e recebe energia diretamente do slot da placa-mãe na voltagem de 3.3V.</p><p>Resumo prático: Se você vai trocar um HD por um SSD SATA de 2.5" no seu computador, pode usar o mesmo cabo sem medo. O SSD é inteligente o suficiente para usar apenas a voltagem de que precisa.</p><p>Você pretende usar um adaptador USB para ligar o disco externamente ou vai instalar dentro do gabinete? (Isso muda se você precisará de uma fonte extra na tomada).</p><p>O conector que você está procurando é chamado de</p><p>Cabo Divisor SATA (ou SATA Power Splitter).</p><p>Ele funciona como uma "extensão em Y": você conecta a ponta única no cabo que vem da sua fonte e ele abre em duas (ou mais) saídas para você ligar dois HDs ou SSDs.</p><p>Como ele é:</p><p>Entrada (Macho): Um conector largo de 15 pinos que se encaixa no cabo da fonte.</p><p>Saídas (Fêmeas): Duas ou mais pontas iguais para conectar nos seus discos.</p><p>Tipos comuns:</p><p>Cabo Y Simples: Transforma 1 conector em 2.</p><p>Cabo Daisy-Chain: Um cabo longo com vários conectores em sequência (comum em fontes modernas).</p></div></div></div>
<div class="accordion-item"><h2 class="accordion-header"><button class="accordion-button collapsed text-primary" type="button" data-bs-toggle="collapse" data-bs-target="#coll53">Cuidados Importantes:</button></h2><div id="coll53" class="accordion-collapse collapse" data-bs-parent="#acordeonDinamico"><div class="accordion-body bg-white" ><p>Cuidados Importantes:</p><p>Evite adaptadores "Molex para SATA": Aqueles conectores brancos antigos de 4 pinos que viram SATA têm fama de serem de baixa qualidade e podem causar curto-circuito ("Molex to SATA, lose your data"). Prefira divisores que já sejam SATA em ambas as pontas.</p><p>Carga da Fonte: HDs de 3.5" consomem mais energia (12V) que SSDs. Evite ligar muitos HDs pesados em um único cabo divisor se a sua fonte for muito básica, embora para 2 ou 3 discos isso raramente seja um problema.</p><p>Você pretende ligar dois HDs grandes de 3.5" ou seriam SSDs? (Isso ajuda a saber se o consumo de energia será uma preocupação).</p><p>Nesse caso, pode usar um</p><p>cabo divisor SATA (Y) sem preocupação nenhuma. Como o SSD consome pouquíssima energia (apenas 5V e quase nada de corrente), ele não vai sobrecarregar o cabo que já alimenta o seu HD.</p><p>O conector que você deve procurar é exatamente este:</p><p>Nome comercial: Cabo Adaptador Splitter de Energia SATA 15 pinos (1 Macho para 2 Fêmeas).</p><p>Como instalar: Você pluga o conector "macho" no cabo que vem da sua fonte e as duas pontas "fêmeas" você liga uma no HD e a outra no SSD.</p></div></div></div>
<div class="accordion-item"><h2 class="accordion-header"><button class="accordion-button collapsed text-primary" type="button" data-bs-toggle="collapse" data-bs-target="#coll62">Dicas para uma instalação segura:</button></h2><div id="coll62" class="accordion-collapse collapse" data-bs-parent="#acordeonDinamico"><div class="accordion-body bg-white" ><p>Dicas para uma instalação segura:</p><p>Encaixe firme: Certifique-se de que os conectores em "L" estejam bem presos. Conexões frouxas em HDs podem causar corrupção de dados ou travamentos no Windows.</p><p>Organização: Tente não dobrar demais o cabo divisor; o ideal é que ele fique relaxado dentro do gabinete para evitar que os pinos internos se soltem com o tempo.</p><p>Qualidade do cabo: Procure cabos que tenham fios de espessura padrão (geralmente marcados como 18AWG). Evite cabos muito finos ou com aparência frágil.</p><p>Como o SSD é muito leve e não vibra, você já pensou em onde vai fixá-lo dentro do gabinete ou vai precisar de um suporte adaptador de 3.5" para 2.5"? (Muitos gabinetes antigos não têm furação para SSDs menores).</p><p>Essa é uma solução muito comum e totalmente segura para SSDs! Como o SSD não possui partes móveis (discos giratórios) e não vibra, ele pode ser fixado em qualquer lugar do gabinete sem problemas de desempenho.</p><p>Apenas tome alguns cuidados básicos para garantir que ele não se solte com o tempo:</p></div></div></div>
<div class="accordion-item"><h2 class="accordion-header"><button class="accordion-button collapsed text-primary" type="button" data-bs-toggle="collapse" data-bs-target="#coll69">Dicas para a "Instalação com Fita":</button></h2><div id="coll69" class="accordion-collapse collapse" data-bs-parent="#acordeonDinamico"><div class="accordion-body bg-white" ><p>Dicas para a "Instalação com Fita":</p><p>Limpeza: Use um pouco de álcool (preferencialmente isopropílico) no local do gabinete e na base do SSD para remover gordura. Isso garante que a fita dupla face não descole com o calor.</p><p>Tipo de Fita: Se possível, use fitas do tipo "Fixa Forte" (VHB/Banana), que aguentam melhor as variações de temperatura dentro do PC.</p><p>Posicionamento: Cole-o em uma parte plana do gabinete (geralmente na lateral interna ou no fundo). Evite colar em cima de componentes que esquentam muito, como a parte de trás do processador ou da placa de vídeo.</p><p>Cuidado com o HD: Nunca cole o SSD diretamente em cima do HD. O HD esquenta bastante e vibra, o que pode derreter a cola da fita e passar calor desnecessário para o SSD.</p><p>Importante:</p><p>Diferente do SSD, o HD nunca deve ser colado. Ele precisa estar parafusado no suporte metálico do gabinete para dissipar o calor e para que a vibração do motor não danifique os discos internos a longo prazo.</p><p>Você já tem os cabos de dados SATA (os fininhos que vão na placa-mãe) para os dois discos ou vai precisar comprar um extra também?</p></div></div></div>
<div class="accordion-item"><h2 class="accordion-header"><button class="accordion-button collapsed text-danger fw-bold" type="button" data-bs-toggle="collapse" data-bs-target="#collQuiz">Avaliação da Aula
1. Quantos e quais cabos um HD ou SSD SATA interno de 2.5" necessita para funcionar corretamente?</button></h2><div id="collQuiz" class="accordion-collapse collapse" data-bs-parent="#acordeonDinamico"><div class="accordion-body " id="quiz-container"><div class="form-check my-2"><input class="form-check-input" type="radio" name="q0" data-correct="false"><label class="form-check-label ms-2">a) Apenas um cabo de dados de 7 pinos.</label></div><div class="form-check my-2"><input class="form-check-input" type="radio" name="q0" data-correct="false"><label class="form-check-label ms-2">b) Um único cabo USB que fornece dados e energia.</label></div><div class="form-check my-2"><input class="form-check-input" type="radio" name="q0" data-correct="true"><label class="form-check-label ms-2">c) Dois cabos distintos: um de dados (7 pinos) e um de alimentação (15 pinos).</label></div><div class="form-check my-2"><input class="form-check-input" type="radio" name="q0" data-correct="false"><label class="form-check-label ms-2">d) Três cabos: dados, energia e aterramento externo.</label></div><div class="form-check my-2"><input class="form-check-input" type="radio" name="q0" data-correct="false"><label class="form-check-label ms-2">e) Apenas um cabo de energia de 15 pinos conectado à placa-mãe.</label></div><p class="fw-bold mt-4">2. Qual é a função específica do cabo de dados SATA de 7 pinos na instalação de um disco?</p><div class="form-check my-2"><input class="form-check-input" type="radio" name="q1" data-correct="false"><label class="form-check-label ms-2">a) Fornecer a tensão de 12V necessária para girar o motor do HD.</label></div><div class="form-check my-2"><input class="form-check-input" type="radio" name="q1" data-correct="true"><label class="form-check-label ms-2">b) Conectar o dispositivo à placa-mãe para a transferência de informações.</label></div><div class="form-check my-2"><input class="form-check-input" type="radio" name="q1" data-correct="false"><label class="form-check-label ms-2">c) Ligar o HD diretamente à fonte de alimentação do computador.</label></div><div class="form-check my-2"><input class="form-check-input" type="radio" name="q1" data-correct="false"><label class="form-check-label ms-2">d) Converter o sinal analógico do disco em sinal digital USB.</label></div><div class="form-check my-2"><input class="form-check-input" type="radio" name="q1" data-correct="false"><label class="form-check-label ms-2">e) Alimentar a placa lógica do SSD com 3.3V.</label></div><p class="fw-bold mt-4">3. Sobre a instalação de SSDs no formato M.2, qual afirmação está correta?</p><div class="form-check my-2"><input class="form-check-input" type="radio" name="q2" data-correct="false"><label class="form-check-label ms-2">a) Eles exigem cabos "Y" para dividir a energia com o HD principal.</label></div><div class="form-check my-2"><input class="form-check-input" type="radio" name="q2" data-correct="false"><label class="form-check-label ms-2">b) Utilizam os mesmos cabos planos de 7 pinos dos HDs de desktop.</label></div><div class="form-check my-2"><input class="form-check-input" type="radio" name="q2" data-correct="false"><label class="form-check-label ms-2">c) Precisam de adaptadores Molex para funcionar em placas-mãe antigas.</label></div><div class="form-check my-2"><input class="form-check-input" type="radio" name="q2" data-correct="true"><label class="form-check-label ms-2">d) Não utilizam cabos; são encaixados e parafusados diretamente em um slot da placa-mãe.</label></div><div class="form-check my-2"><input class="form-check-input" type="radio" name="q2" data-correct="false"><label class="form-check-label ms-2">e) Requerem uma conexão direta com a fonte de alimentação via cabo de 15 pinos.</label></div><p class="fw-bold mt-4">4. O que acontece ao utilizar um cabo SATA de um computador de 15 anos atrás em um SSD SATA III moderno?</p><div class="form-check my-2"><input class="form-check-input" type="radio" name="q3" data-correct="false"><label class="form-check-label ms-2">a) O SSD sofrerá um curto-circuito devido à incompatibilidade de pinagem.</label></div><div class="form-check my-2"><input class="form-check-input" type="radio" name="q3" data-correct="false"><label class="form-check-label ms-2">b) O Windows não reconhecerá o dispositivo por falta de drivers legados.</label></div><div class="form-check my-2"><input class="form-check-input" type="radio" name="q3" data-correct="false"><label class="form-check-label ms-2">c) O encaixe será fisicamente impossível, pois os conectores mudaram.</label></div><div class="form-check my-2"><input class="form-check-input" type="radio" name="q3" data-correct="true"><label class="form-check-label ms-2">d) O encaixe funcionará, mas a velocidade de transferência poderá ser limitada.</label></div><div class="form-check my-2"><input class="form-check-input" type="radio" name="q3" data-correct="false"><label class="form-check-label ms-2">e) O cabo converterá automaticamente a velocidade para 6Gb/s.</label></div><p class="fw-bold mt-4">5. Por que adaptadores USB simples (sem fonte externa) geralmente não funcionam com HDs de desktop (3.5")?</p><div class="form-check my-2"><input class="form-check-input" type="radio" name="q4" data-correct="false"><label class="form-check-label ms-2">a) Porque o USB não possui largura de banda suficiente para discos grandes.</label></div><div class="form-check my-2"><input class="form-check-input" type="radio" name="q4" data-correct="false"><label class="form-check-label ms-2">b) Porque HDs de desktop utilizam apenas 3.3V, voltagem que o USB não fornece.</label></div><div class="form-check my-2"><input class="form-check-input" type="radio" name="q4" data-correct="true"><label class="form-check-label ms-2">c) Porque o USB fornece apenas 5V, e esses HDs precisam de 12V para o motor.</label></div><div class="form-check my-2"><input class="form-check-input" type="radio" name="q4" data-correct="false"><label class="form-check-label ms-2">d) Porque a porta USB causa interferência magnética nos discos do HD.</label></div><div class="form-check my-2"><input class="form-check-input" type="radio" name="q4" data-correct="false"><label class="form-check-label ms-2">e) Porque o conector de dados de um HD de 3.5" é diferente do conector de um SSD.</label></div><p class="fw-bold mt-4">6. Qual é a principal diferença de voltagem entre um HD de desktop (3.5") e um SSD SATA (2.5")?</p><div class="form-check my-2"><input class="form-check-input" type="radio" name="q5" data-correct="false"><label class="form-check-label ms-2">a) O HD utiliza 3.3V e o SSD utiliza 12V.</label></div><div class="form-check my-2"><input class="form-check-input" type="radio" name="q5" data-correct="false"><label class="form-check-label ms-2">b) O SSD exige 12V para operar, enquanto o HD opera apenas com 5V.</label></div><div class="form-check my-2"><input class="form-check-input" type="radio" name="q5" data-correct="true"><label class="form-check-label ms-2">c) O HD precisa de 5V e 12V, enquanto o SSD de 2.5" utiliza apenas 5V.</label></div><div class="form-check my-2"><input class="form-check-input" type="radio" name="q5" data-correct="false"><label class="form-check-label ms-2">d) Ambos utilizam exclusivamente a linha de 12V da fonte de alimentação.</label></div><div class="form-check my-2"><input class="form-check-input" type="radio" name="q5" data-correct="false"><label class="form-check-label ms-2">e) O HD de desktop dispensa energia da fonte e usa apenas a da placa-mãe.</label></div><p class="fw-bold mt-4">7. O que caracteriza um "Cabo Divisor SATA" (Sata Power Splitter) segundo o texto?</p><div class="form-check my-2"><input class="form-check-input" type="radio" name="q6" data-correct="false"><label class="form-check-label ms-2">a) Um cabo que separa os dados da energia em um único conector USB.</label></div><div class="form-check my-2"><input class="form-check-input" type="radio" name="q6" data-correct="true"><label class="form-check-label ms-2">b) Uma "extensão em Y" que cria duas ou mais saídas de energia a partir de um cabo da fonte.</label></div><div class="form-check my-2"><input class="form-check-input" type="radio" name="q6" data-correct="false"><label class="form-check-label ms-2">c) Um adaptador que transforma um slot M.2 em duas portas SATA de dados.</label></div><div class="form-check my-2"><input class="form-check-input" type="radio" name="q6" data-correct="false"><label class="form-check-label ms-2">d) Um componente que reduz a voltagem de 12V para 3.3V para proteger o SSD.</label></div><div class="form-check my-2"><input class="form-check-input" type="radio" name="q6" data-correct="false"><label class="form-check-label ms-2">e) Um cabo utilizado exclusivamente para ligar HDs externos na porta USB.</label></div><p class="fw-bold mt-4">8. Qual é o risco mencionado sobre o uso de adaptadores "Molex para SATA" (conectores brancos de 4 pinos)?</p><div class="form-check my-2"><input class="form-check-input" type="radio" name="q7" data-correct="false"><label class="form-check-label ms-2">a) Eles limitam a velocidade do SSD para o padrão SATA I.</label></div><div class="form-check my-2"><input class="form-check-input" type="radio" name="q7" data-correct="false"><label class="form-check-label ms-2">b) Eles impedem que o computador reconheça mais de um HD.</label></div><div class="form-check my-2"><input class="form-check-input" type="radio" name="q7" data-correct="false"><label class="form-check-label ms-2">c) Eles não fornecem a voltagem de 5V necessária para a placa lógica.</label></div><div class="form-check my-2"><input class="form-check-input" type="radio" name="q7" data-correct="true"><label class="form-check-label ms-2">d) Eles são frequentemente de baixa qualidade e podem causar curto-circuito.</label></div><div class="form-check my-2"><input class="form-check-input" type="radio" name="q7" data-correct="false"><label class="form-check-label ms-2">e) Eles são compatíveis apenas com SSDs do tipo M.2 NVMe.</label></div><p class="fw-bold mt-4">9. Sobre a fixação de um SSD de 2.5" com fita dupla face no gabinete, qual é a recomendação correta?</p><div class="form-check my-2"><input class="form-check-input" type="radio" name="q8" data-correct="false"><label class="form-check-label ms-2">a) Deve-se colar o SSD diretamente em cima do HD para aproveitar a ventilação.</label></div><div class="form-check my-2"><input class="form-check-input" type="radio" name="q8" data-correct="false"><label class="form-check-label ms-2">b) A fita deve ser evitada pois a vibração do SSD pode descolá-la rapidamente.</label></div><div class="form-check my-2"><input class="form-check-input" type="radio" name="q8" data-correct="true"><label class="form-check-label ms-2">c) É uma solução segura, desde que não seja colado em componentes que esquentam muito.</label></div><div class="form-check my-2"><input class="form-check-input" type="radio" name="q8" data-correct="false"><label class="form-check-label ms-2">d) A fita só deve ser usada se o SSD for do tipo M.2.</label></div><div class="form-check my-2"><input class="form-check-input" type="radio" name="q8" data-correct="false"><label class="form-check-label ms-2">e) O SSD deve ser colado obrigatoriamente na placa-mãe para evitar perda de dados.</label></div><p class="fw-bold mt-4">10. Qual é a voltagem específica fornecida pelo slot da placa-mãe para um SSD M.2?</p><div class="form-check my-2"><input class="form-check-input" type="radio" name="q9" data-correct="false"><label class="form-check-label ms-2">a) 12V DC.</label></div><div class="form-check my-2"><input class="form-check-input" type="radio" name="q9" data-correct="false"><label class="form-check-label ms-2">b) 5V DC.</label></div><div class="form-check my-2"><input class="form-check-input" type="radio" name="q9" data-correct="false"><label class="form-check-label ms-2">c) 110V AC.</label></div><div class="form-check my-2"><input class="form-check-input" type="radio" name="q9" data-correct="true"><label class="form-check-label ms-2">d) 3.3V DC.</label></div><div class="form-check my-2"><input class="form-check-input" type="radio" name="q9" data-correct="false"><label class="form-check-label ms-2">e) 9V DC.</label></div><button onclick="enviarAvaliacao()" class="btn btn-danger w-100 mt-3">Enviar Respostas</button></div></div></div>

  <script src="https://jsdelivr.net"></script>
  <script>
    // Função para trocar entre Dashboard e Aula
    function showSection(id, element) {
      document.querySelectorAll('.content-section').forEach(s => s.classList.add('d-none'));
      document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
      document.getElementById(id).classList.remove('d-none');
      element.classList.add('active');
    }

    // Função de envio de avaliação (conecta com seu Google Script)
    function enviarAvaliacao() {
      const quiz = document.getElementById('quiz-container');
      const radios = quiz.querySelectorAll('input[type="radio"]');
      const nomes = [...new Set([...radios].map(r => r.name))];
      let acertos = 0;
      nomes.forEach(nome => {
        const sel = quiz.querySelector(`input[name="${nome}"]:checked`);
        if (sel && sel.dataset.correct === "true") acertos++;
      });
      
      // ALERTA: Troque a URL abaixo pela URL do seu Web App do Google Apps Script
      const GOOGLE_SCRIPT_URL = "SUA_URL_DO_GOOGLE_AQUI";

      alert("Avaliação Finalizada!\nAcertos: " + acertos + " de " + nomes.length + "\nSua nota será enviada para o professor.");
      
      // Envio opcional via fetch para a planilha
      fetch(GOOGLE_SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify({ acertos: acertos, total: nomes.length })
      });
    }
  </script>
