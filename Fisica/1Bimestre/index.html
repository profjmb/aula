const DADOS = JSON.parse(jsonPuro);

    function shuffle(array) {
      let m = array.length, t, i;
      while (m) { i = Math.floor(Math.random() * m--); t = array[m]; array[m] = array[i]; array[i] = t; }
      return array;
    }

    function render() {
      const container = document.getElementById('mainAcc');
      let html = "";
      let qIDGlobal = 0;
      shuffle([...DADOS]).forEach((d, dIdx) => {
        let idAcc = "acc" + dIdx;
        html += '<div class="accordion-item mb-2 border shadow-sm"><h2 class="accordion-header"><button class="accordion-button collapsed fw-bold bg-light text-dark disc-titulo" data-bs-toggle="collapse" data-bs-target="#' + idAcc + '">' + d.titulo + '</button></h2>';
        html += '<div id="' + idAcc + '" class="accordion-collapse collapse"><div class="accordion-body">';
        let contadorVisual = 0;
        shuffle([...d.questoes]).forEach((q) => {
          contadorVisual++; qIDGlobal++;
          html += '<div id="box_q'+qIDGlobal+'" class="questao-bloco"><p class="fw-bold q-txt" data-qid="'+qIDGlobal+'">' + contadorVisual + '. ' + q.pergunta + '</p>';
          shuffle([...q.alternativas]).forEach((alt, aIdx) => {
            let letra = String.fromCharCode(97 + aIdx) + ") ";
            html += '<div class="form-check my-2"><input class="form-check-input" type="radio" name="q' + qIDGlobal + '" data-correct="' + alt.correta + '" value="' + letra + alt.texto + '"><label class="form-check-label">' + letra + alt.texto + '</label></div>';
          });
          html += '</div>';
        });
        html += '</div></div></div>';
      });
      container.innerHTML = html;
    }
    window.onload = render;

    function enviar() {
      const aluno = document.getElementById('selAluno').value;
      if(!aluno) return alert("⚠️ Selecione seu nome!");
      
      const blocos = document.querySelectorAll('.questao-bloco');
      let resultados = []; let primeiraQuestaoVazia = null;

      blocos.forEach(bloco => {
        const qId = bloco.querySelector('.q-txt').dataset.qid;
        const sel = bloco.querySelector('input[name="q'+qId+'"]:checked');
        const disciplina = bloco.closest('.accordion-item').querySelector('.disc-titulo').innerText;
        if(!sel) { 
          bloco.classList.add('erro-questao');
          if(!primeiraQuestaoVazia) primeiraQuestaoVazia = bloco;
        } else {
          bloco.classList.remove('erro-questao');
          resultados.push({ 
            disciplina: disciplina, 
            pergunta: bloco.querySelector('.q-txt').innerText, 
            resposta: sel.value, 
            correta: sel.dataset.correct === "true" 
          });
        }
      });

      if(primeiraQuestaoVazia) {
        const collapseEl = primeiraQuestaoVazia.closest('.accordion-collapse');
        if (collapseEl) { new bootstrap.Collapse(collapseEl, { toggle: false }).show(); }
        setTimeout(() => { primeiraQuestaoVazia.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 300);
        return alert("⚠️ Responda todas as questões!");
      }

      const btn = document.getElementById('btn');
      btn.disabled = true; 
      btn.innerText = "🚀 ENVIANDO...";

      let resumoObj = {}; let detalhesTxt = "";
      resultados.forEach(r => {
        if(!resumoObj[r.disciplina]) resumoObj[r.disciplina] = { acertos: 0, total: 0 };
        resumoObj[r.disciplina].total++;
        if(r.correta) resumoObj[r.disciplina].acertos++;
        detalhesTxt += "["+r.disciplina+"] Q: "+r.pergunta+" R: "+r.resposta+" | ";
      });

      if (detalhesTxt.length > 48000) {
        detalhesTxt = detalhesTxt.substring(0, 48000) + "... [TEXTO CORTADO]";
      }

      fetch("https://script.google.com/macros/s/AKfycbyLhBl7jRliC5oki7yt4eTHk_elEGikj1fH7Dfoiua1w72RFPNBPWSdv0ZDRfmFj96X/exec", {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify({ 
          documento: "Simulados Embaralhados 2026", 
          aluno: aluno, 
          resumo: resumoObj, 
          detalhes: detalhesTxt 
        })
      })
      .then(() => { 
        alert("✅ Atividade enviada com sucesso!"); 
        btn.innerText = "ENVIADO COM SUCESSO!";
        btn.classList.replace('btn-success', 'btn-secondary');
      })
      .catch((err) => { 
        alert("❌ Erro ao enviar. Tente novamente."); 
        btn.disabled = false;
        btn.innerText = "🚀 TENTAR ENVIAR NOVAMENTE"; 
      });
    }
  </script>
